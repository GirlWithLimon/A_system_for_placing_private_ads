services:
  postgres:
    image: postgres:16
    container_name: advertisement_postgres
    environment:
      POSTGRES_DB: advertisement_db
      POSTGRES_USER: advertisement_user
      POSTGRES_PASSWORD: advertisement_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    container_name: advertisement_app
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/advertisement_db
      - DATABASE_USER=advertisement_user
      - DATABASE_PASSWORD=advertisement_password
    restart: unless-stopped

volumes:
  postgres_data: